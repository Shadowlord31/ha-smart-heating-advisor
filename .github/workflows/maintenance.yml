name: Monthly Maintenance

on:
  schedule:
    - cron: "0 10 * * 3"
  workflow_dispatch:

jobs:
  maintenance:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find stable HA version (at least 3 months old)
        id: ha_version
        run: |
          # Alle Releases holen und das neueste finden das mindestens 90 Tage alt ist
          RELEASES=$(curl -s "https://api.github.com/repos/home-assistant/core/releases?per_page=50")
          CUTOFF=$(date -d "90 days ago" +%s)

          TARGET_VERSION=""
          for row in $(echo "$RELEASES" | jq -r ".[] | @base64"); do
            _jq() { echo "$row" | base64 --decode | jq -r "$1"; }
            TAG=$(_jq ".tag_name")
            DATE=$(_jq ".published_at")
            TIMESTAMP=$(date -d "$DATE" +%s)

            # Nur stabile Releases (keine Beta/RC/dev)
            if echo "$TAG" | grep -qE "^[0-9]{4}\.[0-9]+\.[0-9]+$"; then
              if [ "$TIMESTAMP" -le "$CUTOFF" ]; then
                TARGET_VERSION="$TAG"
                echo "Found stable version: $TAG (published: $DATE)"
                break
              fi
            fi
          done

          if [ -z "$TARGET_VERSION" ]; then
            echo "No version older than 90 days found, skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "version=$TARGET_VERSION" >> $GITHUB_OUTPUT
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Check current minimum version
        if: steps.ha_version.outputs.skip != 'true'
        id: current
        run: |
          CURRENT=$(jq -r '.homeassistant // "none"' custom_components/smart_heating_advisor/manifest.json)
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "Current minimum: $CURRENT"

      - name: Update manifest.json
        if: steps.ha_version.outputs.skip != 'true' && steps.current.outputs.current != steps.ha_version.outputs.version
        run: |
          jq --arg ha "${{ steps.ha_version.outputs.version }}"             '.homeassistant = $ha'             custom_components/smart_heating_advisor/manifest.json > /tmp/manifest.json
          mv /tmp/manifest.json custom_components/smart_heating_advisor/manifest.json
          echo "Updated homeassistant to ${{ steps.ha_version.outputs.version }}"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/smart_heating_advisor/manifest.json
          git commit -m "chore: update minimum HA version to ${{ steps.ha_version.outputs.version }}"
          git push

      - name: Status
        run: |
          if [ "${{ steps.changes.outputs.changed }}" == "true" ]; then
            echo "Updated minimum HA version to ${{ steps.ha_version.outputs.version }}"
          else
            echo "No update needed – already up to date or version too recent"
          fi
